<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🇦🇷 Argentina 3-2 Egypt | Messi Shine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            /* ─── Background image ─── */
            background-image: url('https://i.ibb.co/B2z7kKy4/Save-Vid-Net-723238547-17892833730475118-166991184652840835-n.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* keeps background fixed while scrolling */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* ─── Make page scrollable ─── */
            overflow-y: auto;
            padding: 2rem 1rem;
            position: relative;
            user-select: none;
        }

        /* ─── Dark overlay for readability ─── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
            pointer-events: none;
        }

        /* ─── Subtle Argentina stripes ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(90deg, #ffffff 0px, #ffffff 60px, #75aadb 60px, #75aadb 120px);
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── Card ─── */
        .celebration-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 2.8rem 3.5rem 3.5rem;
            max-width: 720px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 255, 255, 0.3) inset, 0 0 0 4px rgba(117, 170, 219, 0.4) inset;
            animation: cardPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform: scale(0.8);
            opacity: 0;

            /* ─── Make card scrollable if content is taller than viewport ─── */
            max-height: 90vh;
            overflow-y: auto;

            /* Optional: hide scrollbar for cleaner look (still scrollable) */
            scrollbar-width: thin;
        }

        .celebration-card::-webkit-scrollbar {
            width: 6px;
        }
        .celebration-card::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }
        .celebration-card::-webkit-scrollbar-thumb {
            background: #75aadb;
            border-radius: 10px;
        }

        @keyframes cardPop {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ─── Flag stripes ─── */
        .flag-stripes {
            display: flex;
            height: 14px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 1.2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .flag-stripes span {
            flex: 1;
        }
        .flag-stripes span:nth-child(odd) {
            background: #ffffff;
        }
        .flag-stripes span:nth-child(even) {
            background: #75aadb;
        }

        .badge {
            display: inline-block;
            background: #f5c542;
            color: #1a2e4a;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 0.25rem 1.2rem;
            border-radius: 40px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            box-shadow: 0 2px 8px rgba(245, 197, 66, 0.4);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #1a2e4a;
            line-height: 1.1;
            margin-bottom: 0.2rem;
        }
        h1 .highlight {
            background: linear-gradient(135deg, #f5c542, #f0b030);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sub {
            font-size: 1.1rem;
            color: #2c4b6e;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 1.5rem;
        }

        /* ─── Scoreboard ─── */
        .scoreboard {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.2rem;
            margin: 1.2rem 0 1.8rem;
            padding: 0.8rem 1.8rem;
            background: rgba(26, 46, 74, 0.06);
            border-radius: 80px;
            border: 2px solid rgba(117, 170, 219, 0.25);
        }
        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .team .flag {
            font-size: 2.2rem;
            line-height: 1;
        }
        .team .name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a2e4a;
            margin-top: 2px;
        }
        .team .score {
            font-size: 2.8rem;
            font-weight: 800;
            color: #1a2e4a;
            line-height: 1;
        }
        .vs {
            font-weight: 700;
            color: #8aa3bc;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .team.arg .score {
            color: #75aadb;
        }
        .team.egy .score {
            color: #c0392b;
        }

        /* ─── Goal Banner ─── */
        .goal-banner {
            background: linear-gradient(135deg, #f5c542, #e8a830);
            border-radius: 60px;
            padding: 0.8rem 1.8rem;
            display: inline-block;
            margin-bottom: 1.4rem;
            box-shadow: 0 8px 0 #b87d20, 0 12px 30px rgba(245, 197, 66, 0.35);
            transform: rotate(-1deg);
            transition: transform 0.2s;
        }
        .goal-banner:hover {
            transform: rotate(0deg) scale(1.02);
        }
        .goal-banner span {
            font-size: 2.2rem;
            font-weight: 900;
            color: #1a2e4a;
            letter-spacing: 2px;
            text-shadow: 0 2px 0 rgba(255, 255, 255, 0.3);
        }

        /* ─── Scorers List ─── */
        .scorers-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem 1.5rem;
            margin-bottom: 1.8rem;
            background: rgba(255, 255, 255, 0.5);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(117, 170, 219, 0.2);
        }
        .scorer-chip {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 1rem;
            font-weight: 600;
            color: #1a2e4a;
            background: rgba(26, 46, 74, 0.06);
            padding: 0.2rem 0.9rem 0.2rem 0.6rem;
            border-radius: 40px;
            border: 1px solid rgba(117, 170, 219, 0.15);
        }
        .scorer-chip .flag {
            font-size: 1.2rem;
        }
        .scorer-chip .name {
            font-weight: 700;
            color: #1a2e4a;
        }
        .scorer-chip .time {
            background: #1a2e4a;
            color: #f5c542;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            letter-spacing: 0.3px;
        }
        .scorer-chip .goal-icon {
            color: #27ae60;
            font-size: 1rem;
        }

        /* ─── Celebrate Button ─── */
        .celebrate-btn {
            background: #1a2e4a;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 0.9rem 2.8rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0d1a2b, 0 8px 24px rgba(26, 46, 74, 0.3);
            transition: all 0.08s ease;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 0.4rem;
        }
        .celebrate-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #0d1a2b, 0 8px 20px rgba(26, 46, 74, 0.25);
        }
        .celebrate-btn:hover {
            background: #1f3d60;
        }

        /* ─── Audio Controls ─── */
        .audio-controls {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
        }
        .audio-controls button {
            background: rgba(26, 46, 74, 0.8);
            border: none;
            color: #fff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .audio-controls button:hover {
            background: #1a2e4a;
        }
        .audio-controls .status {
            font-size: 0.7rem;
            color: #4a7ca8;
        }

        /* ─── Image inside card ─── */
        .card-image {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 1rem;
            max-height: 220px;      /* prevents image from taking too much space */
            object-fit: cover;      /* ensures it fills the width without distortion */
        }

        /* ─── Confetti Canvas ─── */
        #confetti-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* ─── Firework particles ─── */
        .firework-particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9;
        }

        /* ─── Responsive ─── */
        @media (max-width: 540px) {
            .celebration-card {
                padding: 1.8rem 1.5rem 2.2rem;
                border-radius: 32px;
                max-height: 95vh;
            }
            h1 {
                font-size: 2rem;
            }
            .scoreboard {
                gap: 0.6rem;
                padding: 0.6rem 1rem;
            }
            .team .score {
                font-size: 2.2rem;
            }
            .goal-banner span {
                font-size: 1.6rem;
            }
            .celebrate-btn {
                font-size: 1rem;
                padding: 0.7rem 1.8rem;
            }
            .scorers-list {
                gap: 0.5rem;
                padding: 0.6rem 1rem;
            }
            .scorer-chip {
                font-size: 0.85rem;
                padding: 0.1rem 0.6rem;
            }
            .card-image {
                max-height: 150px;
            }
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 1.6rem;
            }
            .team .score {
                font-size: 1.8rem;
            }
            .goal-banner span {
                font-size: 1.3rem;
            }
            .card-image {
                max-height: 120px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── Confetti Canvas ─── -->
    <canvas id="confetti-canvas"></canvas>

    <!-- ─── Main Card ─── -->
    <div class="celebration-card" id="card">

        <!-- Flag stripes -->
        <div class="flag-stripes">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
        </div>

        <!-- Image inside the card (resized to fit) -->
        <img class="card-image"
        src="https://i.ibb.co/B2z7kKy4/Save-Vid-Net-723238547-17892833730475118-166991184652840835-n.jpg"
        alt="FIFA Last Dance" />

        <div class="badge">🏆 FIFA World Cup • Round of 16</div>

        <h1><span class="highlight">MESSI</span> 🐐</h1>
        <p class="sub">Argentina outlasts Egypt in a <br />5‑GOAL THRILLER</p>

        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="team arg">
                <span class="flag">🇦🇷</span>
                <span class="name">Argentina</span>
                <span class="score">3</span>
            </div>
            <span class="vs">VS</span>
            <div class="team egy">
                <span class="flag">🇪🇬</span>
                <span class="name">Egypt</span>
                <span class="score">2</span>
            </div>
        </div>

        <div class="goal-banner">
            <span>⚽⚽⚽ 3 Goals!</span>
        </div>

        <!-- Scorers -->
        <div class="scorers-list">
            <div class="scorer-chip">
                <span class="flag">🇦🇷</span>
                <span class="name">C. Romero</span>
                <span class="time">79'</span>
                <span class="goal-icon">⚽</span>
            </div>
            <div class="scorer-chip">
                <span class="flag">🇦🇷</span>
                <span class="name">L. Messi</span>
                <span class="time">83'</span>
                <span class="goal-icon">⚽</span>
            </div>
            <div class="scorer-chip">
                <span class="flag">🇦🇷</span>
                <span class="name">E. Fernández</span>
                <span class="time">90+3'</span>
                <span class="goal-icon">⚽</span>
            </div>
        </div>

        <!-- Celebrate Button -->
        <button class="celebrate-btn" id="celebrateBtn">🎉 Celebrate Again</button>

        <!-- YouTube Player (hidden) -->
        <div id="youtube-player" style="display: none;"></div>

        <!-- Audio Controls -->
        <div class="audio-controls">
            <button id="playAudioBtn">▶ Play Anthem</button>
            <span class="status" id="audioStatus">🎵 "Wavin' Flag"</span>
        </div>

        <p style="margin-top: 1.2rem; font-size:0.8rem; color:#6a8aa8; letter-spacing:0.5px;">
            ¡Vamos Argentina! 🇦🇷
        </p>
    </div>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  YOUTUBE PLAYER (Wavin' Flag)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        let player;
        let isPlayerReady = false;
        const playBtn = document.getElementById('playAudioBtn');
        const statusEl = document.getElementById('audioStatus');

        function loadYouTubeAPI() {
            const tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        }

        window.onYouTubeIframeAPIReady = function() {
            player = new YT.Player('youtube-player', {
                videoId: 'amXeJrA-wDc',
                playerVars: {
                    autoplay: 1,
                    controls: 0,
                    disablekb: 1,
                    fs: 0,
                    iv_load_policy: 3,
                    modestbranding: 1,
                    rel: 0,
                    showinfo: 0
                },
                events: {
                    onReady: function(event) {
                        isPlayerReady = true;
                        event.target.playVideo().catch(() => {
                            statusEl.textContent = '🔇 Autoplay blocked – click Play';
                            playBtn.textContent = '▶ Play Anthem';
                        });
                    },
                    onStateChange: function(event) {
                        if (event.data === YT.PlayerState.PLAYING) {
                            statusEl.textContent = '🎵 Now playing!';
                            playBtn.textContent = '⏸ Pause';
                        } else if (event.data === YT.PlayerState.PAUSED) {
                            statusEl.textContent = '⏸ Paused';
                            playBtn.textContent = '▶ Play Anthem';
                        } else if (event.data === YT.PlayerState.ENDED) {
                            statusEl.textContent = '⏹️ Ended';
                            playBtn.textContent = '▶ Play Anthem';
                        }
                    }
                }
            });
        };

        loadYouTubeAPI();

        playBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!isPlayerReady) return;
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  CONFETTI ENGINE (full)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        (function confetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            let W, H, particles = [],
                animationFrame;
            const COLORS = ['#75aadb', '#4a7ca8', '#ffffff', '#f5c542', '#f0b030', '#1a2e4a', '#27ae60'];

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H - H * 0.2;
                    this.size = Math.random() * 10 + 4;
                    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                    this.rotation = Math.random() * 360;
                    this.rotSpeed = (Math.random() - 0.5) * 6;
                    this.speedX = (Math.random() - 0.5) * 1.8;
                    this.speedY = Math.random() * 3 + 2;
                    this.wobble = Math.random() * 0.06;
                    this.wobbleOffset = Math.random() * 100;
                    this.opacity = Math.random() * 0.5 + 0.5;
                    this.shape = Math.random() > 0.6 ? 'circle' : 'rect';
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX + Math.sin(this.y * this.wobble + this.wobbleOffset) * 0.5;
                    this.rotation += this.rotSpeed;
                    if (this.y > H + 30) { this.reset();
                        this.y = -20 - Math.random() * 40; }
                    if (this.x < -30) this.x = W + 20;
                    if (this.x > W + 30) this.x = -20;
                }
                draw(ctx) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate((this.rotation * Math.PI) / 180);
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = this.color;
                    if (this.shape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size * 0.5, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        const w = this.size * 0.7,
                            h = this.size * 1.1;
                        ctx.fillRect(-w / 2, -h / 2, w, h);
                    }
                    ctx.restore();
                }
            }

            function initParticles(count) {
                particles = [];
                for (let i = 0; i < count; i++) { const p = new Particle();
                    p.y = Math.random() * H;
                    particles.push(p); }
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                for (const p of particles) { p.update();
                    p.draw(ctx); }
                animationFrame = requestAnimationFrame(draw);
            }

            function start() {
                if (animationFrame) cancelAnimationFrame(animationFrame);
                resize();
                initParticles(220);
                draw();
            }

            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => { resize(); }, 100);
            });

            window.restartConfetti = function() {
                for (const p of particles) {
                    p.y = -20 - Math.random() * 60;
                    p.x = Math.random() * W;
                    p.speedY = Math.random() * 4 + 2;
                    p.speedX = (Math.random() - 0.5) * 2.5;
                    p.opacity = Math.random() * 0.6 + 0.4;
                }
                for (let i = 0; i < 40; i++) {
                    const p = new Particle();
                    p.y = -10 - Math.random() * 30;
                    p.x = Math.random() * W;
                    p.speedY = Math.random() * 5 + 3;
                    p.speedX = (Math.random() - 0.5) * 4;
                    particles.push(p);
                }
                if (particles.length > 350) particles.splice(0, particles.length - 300);
            };

            start();

            function createFireworkBurst(cx, cy) {
                const count = 60;
                const colors = ['#f5c542', '#ff6b6b', '#75aadb', '#ffffff', '#2ecc71', '#e67e22'];
                for (let i = 0; i < count; i++) {
                    const el = document.createElement('div');
                    el.className = 'firework-particle';
                    const size = Math.random() * 8 + 3;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 6 + 2;
                    const dx = Math.cos(angle) * speed;
                    const dy = Math.sin(angle) * speed - 1;
                    el.style.width = size + 'px';
                    el.style.height = size + 'px';
                    el.style.background = colors[Math.floor(Math.random() * colors.length)];
                    el.style.left = cx + 'px';
                    el.style.top = cy + 'px';
                    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    el.style.boxShadow = '0 0 6px rgba(255,255,255,0.3)';
                    document.body.appendChild(el);
                    let x = cx,
                        y = cy;
                    let vx = dx,
                        vy = dy;
                    let life = 1;
                    const animateFirework = () => {
                        if (life <= 0) { el.remove(); return; }
                        x += vx;
                        y += vy;
                        vy += 0.08;
                        vx *= 0.99;
                        life -= 0.012;
                        el.style.left = x + 'px';
                        el.style.top = y + 'px';
                        el.style.opacity = life;
                        el.style.transform = `scale(${life}) rotate(${life * 180}deg)`;
                        requestAnimationFrame(animateFirework);
                    };
                    animateFirework();
                }
            }

            document.getElementById('card').addEventListener('click', (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                createFireworkBurst(cx, cy);
                window.restartConfetti();
            });

            document.getElementById('celebrateBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = document.getElementById('card').getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                createFireworkBurst(cx, cy);
                window.restartConfetti();
                setTimeout(() => {
                    const x2 = rect.left + Math.random() * rect.width;
                    const y2 = rect.top + Math.random() * rect.height;
                    createFireworkBurst(x2, y2);
                }, 150);
            });

            setTimeout(() => {
                const card = document.getElementById('card');
                const rect = card.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                createFireworkBurst(cx, cy);
                setTimeout(() => createFireworkBurst(cx - 60, cy - 40), 200);
                setTimeout(() => createFireworkBurst(cx + 70, cy + 30), 400);
            }, 600);
        })();
    </script>

</body>
</html>
